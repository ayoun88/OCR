# @package _global_

defaults:
  - /preset/models/decoder/asf
  - /preset/models/encoder/timm_backbone
  - /preset/models/head/db_head
  - /preset/models/loss/db_loss
  - _self_

models:
  optimizer:
    _target_: torch.optim.AdamW
    lr: 0.0001
    weight_decay: 0.05
  scheduler:
    _target_: torch.optim.lr_scheduler.CosineAnnealingLR
    T_max: 50    
    eta_min: 0.000001
